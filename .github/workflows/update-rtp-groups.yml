name: Update RTP Group Channels

on:
  workflow_dispatch:
  schedule:
    # 每 3 天 UTC 02:00 执行一次
    - cron: "0 2 */3 * *"

concurrency:
  group: update-rtp-groups-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "${{ github.workspace }}/requirements.txt" ]; then
            pip install -r "${{ github.workspace }}/requirements.txt"
          else
            echo "requirements.txt not found, fallback to direct install."
            pip install "requests>=2.31.0" "pycryptodome>=3.20.0"
          fi

      - name: Run RTP group extractor
        run: python rtp/extract_rtp_group_channels.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rtp/rtp/*.txt || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto update rtp group channels"
            git pull --rebase origin main
            git push
          fi
